name: sunmi_scanner
description: "Sunmi support package that allows you to easily interface with your scanner device"
version: 0.0.7
repository: "https://github.com/FrenkyDema/sunmi_scanner"

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.francescodema.sunmi_scanner
        pluginClass: SunmiScannerPlugin
